name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet-desktop pyinstaller

      - name: Bundle Flet desktop client into package
        run: |
          $ver = python -c "import flet_desktop.version; print(flet_desktop.version.version)"
          $appDir = python -c "from flet_desktop import get_package_bin_dir; print(get_package_bin_dir())"
          New-Item -ItemType Directory -Force $appDir | Out-Null
          $url = "https://github.com/flet-dev/flet/releases/download/v$ver/flet-windows.zip"
          Write-Output "Downloading Flet desktop client v$ver..."
          Invoke-WebRequest -Uri $url -OutFile "$appDir\flet-windows.zip"
          Write-Output "Flet client bundled at $appDir"

      - name: Build standalone executable
        run: pyinstaller bluebot.spec --noconfirm --clean

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build Windows installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\bluebot.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bluebot-Setup
          path: installer\Output\Bluebot-Setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer\Output\Bluebot-Setup.exe
          body: |
            ## Bluebot Agent ${{ github.ref_name }}

            ### Installation
            1. Download `Bluebot-Setup.exe` and run it
            2. Open `config.txt` inside the install folder
            3. Replace `your_gemini_api_key_here` with your key from https://aistudio.google.com/apikey
            4. Make sure `CHROME_PATH` points to your Chrome installation
            5. Launch **Bluebot Agent** from the desktop shortcut
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
